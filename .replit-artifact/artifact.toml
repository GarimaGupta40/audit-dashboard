kind = "web"
previewPath = "/"
title = "Digital Marketing Audit Dashboard"
version = "1.0.0"
id = "artifacts/audit-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19587

[services.development]
run = "pnpm --filter @workspace/audit-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audit-dashboard", "run", "build" ]
publicDir = "artifacts/audit-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19587"
BASE_PATH = "/"
